<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stillness — A Digital Sanctuary</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Inter:wght@200;300&display=swap');

        body {
            font-family: 'Cormorant Garamond', serif;
            background: #0a0a0f;
            color: #e8e6e3;
            overflow: hidden;
            height: 100vh;
            cursor: none;
        }

        .cursor {
            width: 20px;
            height: 20px;
            border: 1px solid rgba(232, 230, 227, 0.5);
            border-radius: 50%;
            position: fixed;
            pointer-events: none;
            z-index: 9999;
            transition: transform 0.1s ease, width 0.3s ease, height 0.3s ease;
            mix-blend-mode: difference;
        }

        .cursor.hovered {
            width: 60px;
            height: 60px;
            border-color: rgba(255, 255, 255, 0.8);
        }

        .universe {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            animation: twinkle var(--duration) ease-in-out infinite;
            opacity: var(--opacity);
        }

        @keyframes twinkle {
            0%, 100% { opacity: var(--opacity); transform: scale(1); }
            50% { opacity: 0.2; transform: scale(0.8); }
        }

        .container {
            position: relative;
            z-index: 1;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 2rem;
        }

        .breath-ring {
            width: 200px;
            height: 200px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s ease;
        }

        .breath-ring::before,
        .breath-ring::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .breath-ring::before {
            width: 300px;
            height: 300px;
        }

        .breath-ring::after {
            width: 400px;
            height: 400px;
        }

        .breath-text {
            font-size: 1.2rem;
            font-weight: 300;
            letter-spacing: 0.3em;
            text-transform: lowercase;
            opacity: 0.7;
            transition: opacity 0.5s ease;
        }

        .message {
            margin-top: 4rem;
            text-align: center;
            max-width: 600px;
        }

        .message .line {
            font-size: clamp(1.5rem, 4vw, 2.5rem);
            font-weight: 300;
            line-height: 1.6;
            opacity: 0;
            transform: translateY(20px);
            transition: all 1s ease;
        }

        .message .line.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .message .line.emphasis {
            font-style: italic;
            color: #c9b896;
        }

        .grain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
            opacity: 0.03;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        }

        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }

        .particle {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: float 20s linear infinite;
        }

        @keyframes float {
            from { transform: translateY(100vh) translateX(0); opacity: 0; }
            10% { opacity: 0.5; }
            90% { opacity: 0.5; }
            to { transform: translateY(-10vh) translateX(50px); opacity: 0; }
        }

        .input-sanctuary {
            position: fixed;
            bottom: 3rem;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            opacity: 0;
            transition: opacity 1s ease 3s;
        }

        .input-sanctuary.visible {
            opacity: 1;
        }

        .whisper-input {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            color: #e8e6e3;
            font-family: 'Cormorant Garamond', serif;
            font-size: 1rem;
            padding: 0.5rem 1rem;
            text-align: center;
            width: 300px;
            outline: none;
            transition: border-color 0.3s ease;
        }

        .whisper-input::placeholder {
            color: rgba(255, 255, 255, 0.3);
            font-style: italic;
        }

        .whisper-input:focus {
            border-bottom-color: rgba(201, 184, 150, 0.6);
        }

        .release-btn {
            margin-top: 1rem;
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.6);
            padding: 0.6rem 2rem;
            font-family: 'Inter', sans-serif;
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.3s ease;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .release-btn:hover {
            border-color: rgba(201, 184, 150, 0.6);
            color: #c9b896;
        }

        .floating-whispers {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .whisper {
            position: absolute;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.15);
            font-style: italic;
            animation: whisper-float 30s linear infinite;
            white-space: nowrap;
        }

        @keyframes whisper-float {
            from { transform: translateX(-100px); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            to { transform: translateX(calc(100vw + 100px)); opacity: 0; }
        }

        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="cursor" id="cursor"></div>
    <div class="grain"></div>
    <div class="universe" id="universe"></div>
    <div class="particles" id="particles"></div>
    <div class="floating-whispers" id="whispers"></div>
    
    <div class="container">
        <div class="breath-ring" id="breathRing">
            <span class="breath-text" id="breathText">inhale</span>
        </div>
        
        <div class="message" id="message">
            <p class="line">The world is loud.</p>
            <p class="line">But right here, right now,</p>
            <p class="line emphasis">you don't have to be.</p>
        </div>
    </div>

    <div class="input-sanctuary" id="inputSanctuary">
        <input type="text" class="whisper-input" id="whisperInput" 
               placeholder="leave a thought in the silence..." maxlength="100">
        <button class="release-btn" id="releaseBtn">Release</button>
    </div>

    <script>
        // Custom cursor
        const cursor = document.getElementById('cursor');
        let mouseX = 0, mouseY = 0;
        let cursorX = 0, cursorY = 0;

        document.addEventListener('mousemove', (e) => {
            mouseX = e.clientX;
            mouseY = e.clientY;
        });

        function animateCursor() {
            cursorX += (mouseX - cursorX) * 0.1;
            cursorY += (mouseY - cursorY) * 0.1;
            cursor.style.left = cursorX - 10 + 'px';
            cursor.style.top = cursorY - 10 + 'px';
            requestAnimationFrame(animateCursor);
        }
        animateCursor();

        // Hover effect on interactive elements
        document.querySelectorAll('button, input').forEach(el => {
            el.addEventListener('mouseenter', () => cursor.classList.add('hovered'));
            el.addEventListener('mouseleave', () => cursor.classList.remove('hovered'));
        });

        // Starfield generation
        const universe = document.getElementById('universe');
        const starCount = 200;

        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 0.5;
            star.style.width = size + 'px';
            star.style.height = size + 'px';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.setProperty('--duration', (Math.random() * 3 + 2) + 's');
            star.style.setProperty('--opacity', Math.random() * 0.7 + 0.3);
            star.style.animationDelay = Math.random() * 5 + 's';
            universe.appendChild(star);
        }

        // Floating particles
        const particlesContainer = document.getElementById('particles');
        for (let i = 0; i < 30; i++) {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 20 + 's';
            particle.style.animationDuration = (15 + Math.random() * 15) + 's';
            particlesContainer.appendChild(particle);
        }

        // Breathing animation
        const breathRing = document.getElementById('breathRing');
        const breathText = document.getElementById('breathText');
        let breathScale = 1;
        let breathDirection = 1;
        let breathPhase = 0;

        function breathe() {
            const cycle = 8000; // 8 second breath cycle
            const now = Date.now() % cycle;
            const phase = now / cycle;
            
            if (phase < 0.4) {
                // Inhale (4 seconds)
                breathScale = 1 + (phase / 0.4) * 0.5;
                breathText.textContent = 'inhale';
            } else if (phase < 0.5) {
                // Hold (1 second)
                breathScale = 1.5;
                breathText.textContent = 'hold';
            } else if (phase < 0.9) {
                // Exhale (4 seconds)
                breathScale = 1.5 - ((phase - 0.5) / 0.4) * 0.5;
                breathText.textContent = 'exhale';
            } else {
                // Pause (1 second)
                breathScale = 1;
                breathText.textContent = 'pause';
            }

            breathRing.style.transform = `scale(${breathScale})`;
            requestAnimationFrame(breathe);
        }
        breathe();

        // Text reveal animation
        const lines = document.querySelectorAll('.line');
        lines.forEach((line, index) => {
            setTimeout(() => {
                line.classList.add('visible');
            }, 1500 + index * 800);
        });

        // Show input after message
        setTimeout(() => {
            document.getElementById('inputSanctuary').classList.add('visible');
        }, 5000);

        // Whisper system - anonymous thoughts floating by
        const whispersContainer = document.getElementById('whispers');
        const sampleWhispers = [
            "I miss someone I haven't spoken to in years",
            "Today I smiled at a stranger",
            "The coffee was perfect this morning",
            "I'm scared of what's next",
            "I forgive you",
            "The sunset made me cry",
            "I finally let go",
            "Small things matter most",
            "I'm proud of myself today",
            "It's okay to not be okay"
        ];

        // Load saved whispers
        let savedWhispers = JSON.parse(localStorage.getItem('sanctuaryWhispers') || '[]');
        if (savedWhispers.length === 0) {
            savedWhispers = sampleWhispers;
        }

        function createFloatingWhisper(text, startRight = false) {
            const whisper = document.createElement('div');
            whisper.className = 'whisper';
            whisper.textContent = text;
            whisper.style.top = (10 + Math.random() * 80) + '%';
            whisper.style.animationDuration = (25 + Math.random() * 20) + 's';
            
            if (startRight) {
                whisper.style.left = '100%';
                whisper.style.animation = 'whisper-float ' + (25 + Math.random() * 20) + 's linear forwards';
            } else {
                whisper.style.animationDelay = Math.random() * 30 + 's';
            }
            
            whispersContainer.appendChild(whisper);
            
            // Remove after animation
            setTimeout(() => {
                whisper.remove();
            }, 50000);
        }

        // Initial whispers
        savedWhispers.forEach((w, i) => {
            setTimeout(() => createFloatingWhisper(w), i * 3000);
        });

        // Continue creating whispers
        setInterval(() => {
            if (savedWhispers.length > 0) {
                const randomWhisper = savedWhispers[Math.floor(Math.random() * savedWhispers.length)];
                createFloatingWhisper(randomWhisper, true);
            }
        }, 15000);

        // Handle new whispers
        const whisperInput = document.getElementById('whisperInput');
        const releaseBtn = document.getElementById('releaseBtn');

        function releaseWhisper() {
            const text = whisperInput.value.trim();
            if (text) {
                savedWhispers.push(text);
                if (savedWhispers.length > 50) savedWhispers.shift();
                localStorage.setItem('sanctuaryWhispers', JSON.stringify(savedWhispers));
                createFloatingWhisper(text, true);
                whisperInput.value = '';
                whisperInput.placeholder = 'released into the silence...';
                setTimeout(() => {
                    whisperInput.placeholder = 'leave a thought in the silence...';
                }, 2000);
            }
        }

        releaseBtn.addEventListener('click', releaseWhisper);
        whisperInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') releaseWhisper();
        });

        // Parallax effect on mouse move
        document.addEventListener('mousemove', (e) => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            
            universe.style.transform = `translate(${x * 0.5}px, ${y * 0.5}px)`;
            breathRing.style.transform = `scale(${breathScale}) translate(${x * 0.2}px, ${y * 0.2}px)`;
        });

        // Ambient audio context (silent until interaction)
        let audioContext;
        document.addEventListener('click', () => {
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                // Could add ambient drone here if desired
            }
        }, { once: true });

        // Tab visibility - pause animations when hidden
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                document.body.style.animationPlayState = 'paused';
            } else {
                document.body.style.animationPlayState = 'running';
            }
        });
    </script>
</body>
</html>
